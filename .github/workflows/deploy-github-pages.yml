# Deploy estático (next export) para GitHub Pages.
# Settings → Pages → Build and deployment → Source: GitHub Actions
# URL: https://<user>.github.io/site-qdelicia-frutas/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        env:
          # Deve ser "/<nome-exato-do-repositório>" para projeto em github.io/<repo>/
          BASE_PATH: /site-qdelicia-frutas
        run: |
          npm ci
          npm run build
          test -f out/index.html
          test -f out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
