# Next.js estático (output: export) → GitHub Pages via Actions.
# Settings → Pages → Source: GitHub Actions (não "Deploy from a branch").
# BASE_PATH = "/<nome-do-repo>" para https://<user>.github.io/<repo>/
#
# Não usamos actions/configure-pages (static_site_generator: next) para não
# sobrescrever o next.config.mjs do projeto.
name: Deploy Next.js site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      BASE_PATH: /site-qdelicia-frutas
      # Não definir NODE_ENV=production no job: npm ci omitiria devDependencies
      # (tailwindcss, postcss, typescript…) e o next build quebra.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', '**/*.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Validate static export
        run: |
          test -f out/index.html
          test -f out/.nojekyll
          test -d out/_next
          test -s out/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
