# Deploy estático (next export) para GitHub Pages.
# Settings → Pages → Source: GitHub Actions (não "Deploy from a branch").
# Abra: https://mateusxavierr.github.io/site-qdelicia-frutas/ (com o nome do repo no path).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      NODE_ENV: production
      BASE_PATH: /site-qdelicia-frutas
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Validate export (index, _next, .nojekyll)
        run: |
          test -f out/index.html
          test -f out/.nojekyll
          test -d out/_next
          test -s out/index.html
          ls -la out | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
