# Publica o export estático (pasta out/) no branch gh-pages.
#
# Depois do primeiro deploy bem-sucedido, configure:
#   Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
#
# URL: https://mateusxavierr.github.io/site-qdelicia-frutas/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CI: true
      NODE_ENV: production
      BASE_PATH: /site-qdelicia-frutas
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Validate export
        run: |
          test -f out/index.html
          test -f out/.nojekyll
          test -d out/_next
          test -s out/index.html

      - name: Push out/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
